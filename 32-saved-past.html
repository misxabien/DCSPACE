<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Saved Past Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --sidebar-bg: #DAE4F8; --main-bg: #FFFCF8; --blue: #448AFF; --text: #1a1a1a; --muted: #6b6b6b; --card-hover: #FFEED5; --sidebar-width: 248px; --font: 'Montserrat', sans-serif; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--main-bg); color: var(--text); }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); padding: 28px 20px 32px; display: flex; flex-direction: column; }
    .sidebar__brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 36px; }
    .sidebar__logo { width: 120px; filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%); }
    .sidebar__title { font-size: 15px; font-weight: 800; color: var(--blue); }
    .nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--blue); font-size: 14px; font-weight: 600; text-decoration: none; }
    .nav a svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
    .nav a.is-active { background: var(--blue); color: #fff; }
    .nav a.is-active svg { stroke: #fff; }
    .sidebar__spacer { flex: 1; }
    .main { flex: 1; padding: 32px 40px 48px; }
    .main__greeting { font-size: 2rem; font-weight: 700; color: var(--blue); margin-bottom: 24px; }
    .search-bar { display: flex; margin-bottom: 24px; }
    .search-bar__field { flex: 1; height: 44px; padding: 0 16px; background: #fff; border: 1px solid #d0d0d0; border-radius: 10px 0 0 10px; display: flex; align-items: center; }
    .search-bar__field input { flex: 1; border: none; outline: none; font-family: var(--font); }
    .search-bar__filter { width: 48px; height: 44px; border: none; border-radius: 0 10px 10px 0; background: linear-gradient(180deg, #f5c842 0%, #e8a832 100%); cursor: pointer; }
    .back-btn { display: inline-flex; margin-bottom: 20px; color: var(--blue); font-weight: 600; text-decoration: none; }
    .section-head h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .event-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .saved-empty { font-size: 13px; color: var(--muted); }
    .saved-empty[hidden] { display: none; }
    .event-card { background: #fff; border: 1px solid #448AFF; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .event-card:hover { background: var(--card-hover); }
    .event-card__media { height: 100px; background: linear-gradient(135deg, #e8eef8 0%, #d4e2f7 100%); position: relative; }
    .event-card__bookmark { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border: none; border-radius: 50%; background: #fff; color: #448AFF; cursor: pointer; }
    .event-card__body { display: flex; gap: 16px; padding: 14px 16px; }
    .event-card__date-day { font-size: 28px; color: #448AFF; font-weight: 700; }
    .event-card__name { font-size: 14px; font-weight: 700; }
    .event-card__venue { font-size: 12px; color: #448AFF; font-weight: 600; }
    @media (max-width: 900px) { .event-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar__brand"><img src="finallogo.png" alt="DC Space" class="sidebar__logo"><span class="sidebar__title">DC SPACE</span></div>
      <nav><ul class="nav">
        <li><a href="./09-home.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z"/></svg>Home</a></li>
        <li><a href="./14-event.html"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Events</a></li>
        <li><a href="./22-attendance.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Attendance</a></li>
        <li><a href="./29-saved.html" class="is-active"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Saved Events</a></li>
        <li><a href="./26-certificates.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Certificates</a></li>
      </ul></nav>
      <div class="sidebar__spacer"></div>
    </aside>
    <main class="main">
      <h1 class="main__greeting">Saved Events</h1>
      <div class="search-bar"><div class="search-bar__field"><input type="search" placeholder="Search" aria-label="Search past saved events"></div><button type="button" class="search-bar__filter" aria-label="Filter"></button></div>
      <a class="back-btn" href="./29-saved.html">← Back to Saved Events</a>
      <section class="section-head"><h2>Past Events</h2></section>
      <p class="saved-empty" id="saved-empty" hidden>No past saved events yet.</p>
      <section class="event-grid" id="saved-grid"></section>
    </main>
  </div>
  <script src="events-data.js"></script>
  <script src="event-card.js"></script>
  <script>
    (function () {
      function render() {
        DCEvents.fillSavedContainer('saved-grid', { timing: 'past', detailContext: 'explore' });
        document.getElementById('saved-empty').hidden = document.getElementById('saved-grid').children.length > 0;
      }
      render();
      window.addEventListener('dc-saved-changed', render);
    })();
  </script>
</body>
</html>
