<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Feedback Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #DAE4F8;
      --main-bg: #FFFCF8;
      --blue: #448AFF;
      --blue-dark: #3a7aee;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --brown: #b8956f;
      --brown-border: #d4b896;
      --card-hover: #FFEED5;
      --star-filled: #f5a623;
      --sidebar-width: 248px;
      --font: 'Montserrat', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--main-bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 32px;
      min-height: 100vh;
      position: relative;
      transition: width 0.22s ease, padding 0.22s ease;
    }

    .sidebar__collapse {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar__collapse:hover { background: rgba(68, 138, 255, 0.12); }
    .sidebar__collapse svg { width: 22px; height: 22px; display: block; }
    .app.is-sidebar-collapsed .sidebar__collapse { display: none; }

    .sidebar__toggle {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border: none;
      border-radius: 16px;
      background: rgba(68, 138, 255, 0.12);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .app.is-sidebar-collapsed .sidebar__toggle { display: flex; }

    .sidebar__toggle img {
      width: 32px;
      height: 32px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
    }

    .sidebar__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
    }

    .sidebar__logo {
      width: 120px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
      margin-bottom: 4px;
    }

    .sidebar__title {
      font-size: 15px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.06em;
    }

    .nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .nav a svg { width: 20px; height: 20px; flex-shrink: 0; stroke: currentColor; fill: none; }
    .nav a:hover:not(.is-active) { background: rgba(68, 138, 255, 0.12); }
    .nav a.is-active { background: var(--blue); color: #fff; }
    .nav a.is-active svg { stroke: #fff; }

    .sidebar__spacer { flex: 1; min-height: 24px; }
    .nav--bottom { margin-top: auto; padding-top: 16px; }

    .app.is-sidebar-collapsed .sidebar { width: 102px; padding: 28px 12px 24px; }
    .app.is-sidebar-collapsed .sidebar__brand { display: none; }
    .app.is-sidebar-collapsed .nav a { justify-content: center; gap: 0; padding: 14px 0; font-size: 0; }
    .app.is-sidebar-collapsed .nav a svg { width: 24px; height: 24px; }
    .app.is-sidebar-collapsed .nav a.is-active { width: 56px; margin: 0 auto; }

    .main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 32px 40px 48px;
    }

    .main__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .main__greeting {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 700;
      color: var(--blue);
      line-height: 1.15;
    }

    .main__tools {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .main__user-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      white-space: nowrap;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      flex-shrink: 0;
    }

    .tool-btn:hover { background: rgba(68, 138, 255, 0.1); }
    .tool-btn--avatar { background: #c5d9fc; }
    .tool-btn--help { background: #c5d9fc; color: #fff; }
    .tool-btn--help:hover { background: #b5cffc; color: #fff; }
    .tool-btn--help svg { width: 22px; height: 22px; flex-shrink: 0; }
    .tool-btn svg { width: 22px; height: 22px; }

    /* ── Detail sub-header ── */
    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .detail-back:hover { color: var(--blue); }

    .detail-back svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .detail-submitted {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--brown);
      text-align: right;
      line-height: 1.4;
    }

    /* ── Detail fields ── */
    .detail-panel {
      max-width: 900px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(184, 149, 111, 0.2);
    }

    .detail-row__label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
      min-width: 140px;
    }

    .detail-row__value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      flex: 1;
    }

    .detail-block {
      padding: 22px 0;
      border-bottom: 1px solid rgba(184, 149, 111, 0.2);
    }

    .detail-block:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .detail-block__label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      display: block;
    }

    .detail-stars {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .detail-stars__star {
      width: 22px;
      height: 22px;
      color: #d0d0d0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-stars__star svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .detail-stars__star.is-filled {
      color: var(--star-filled);
    }

    .detail-stars__star.is-filled svg {
      fill: currentColor;
      stroke: currentColor;
    }

    .detail-media {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .detail-media__thumb {
      width: 200px;
      height: 130px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, #3a4a5c 0%, #1e2a38 100%);
      border: 1px solid rgba(184, 149, 111, 0.35);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .detail-media__thumb::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 70px;
      border-radius: 30px 30px 0 0;
      background: linear-gradient(180deg, #6b7b8d 0%, #4a5568 100%);
    }

    .detail-media__thumb::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(180deg, rgba(255, 200, 80, 0.35) 0%, transparent 100%);
    }

    .detail-media__thumb--alt {
      background: linear-gradient(135deg, #2d3e50 0%, #1a2530 100%);
    }

    .detail-media__thumb--alt::before {
      width: 50px;
      height: 60px;
      background: linear-gradient(180deg, #5a6a7a 0%, #3d4a58 100%);
    }

    .detail-comment {
      width: 100%;
      min-height: 160px;
      padding: 16px 18px;
      border: 1px solid var(--brown-border);
      border-radius: 10px;
      background: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .detail-comment:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(68, 138, 255, 0.12);
    }

    .detail-comment::placeholder {
      color: #b0b0b0;
    }

    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; padding: 20px; }
      .sidebar__collapse, .sidebar__toggle { display: none !important; }
      .sidebar__spacer, .nav--bottom { display: none; }
      .main { padding: 24px 20px 40px; }
      .main__user-name { display: none; }
      .detail-row { flex-direction: column; align-items: flex-start; gap: 8px; }
      .detail-row__value, .detail-stars { text-align: left; justify-content: flex-start; }
      .detail-head { flex-direction: column; align-items: flex-start; }
      .detail-submitted { text-align: left; }
      .detail-media__thumb { width: 100%; max-width: 280px; }
    }
  </style>
  <link rel="stylesheet" href="site-tour.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Main navigation">
      <button type="button" class="sidebar__collapse" id="sidebar-collapse" aria-label="Collapse sidebar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6.5" cy="6.5" r="2.8" fill="currentColor" opacity="0.78"/><circle cx="17.5" cy="6.5" r="3.6" fill="currentColor"/><circle cx="6.5" cy="17.5" r="3.6" fill="currentColor"/><circle cx="17.5" cy="17.5" r="2.3" fill="currentColor"/></svg>
      </button>
      <button type="button" class="sidebar__toggle" id="sidebar-toggle" aria-label="Expand sidebar">
        <img src="finallogo.png" alt="">
      </button>
      <div class="sidebar__brand">
        <img src="finallogo.png" alt="DC Space" class="sidebar__logo" width="120" height="60">
        <span class="sidebar__title">DC SPACE</span>
      </div>
      <nav aria-label="Primary">
        <ul class="nav">
          <li><a href="./09-home.html"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z"/></svg>Home</a></li>
          <li><a href="./14-event.html"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Events</a></li>
          <li><a href="./22-attendance.html"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Attendance</a></li>
          <li><a href="./29-saved.html"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Saved Events</a></li>
          <li><a href="./26-certificates.html"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Certificates</a></li>
        </ul>
      </nav>
      <div class="sidebar__spacer" aria-hidden="true"></div>
      <ul class="nav nav--bottom">
        <li>
          <a href="./33-feedbacl.html" class="is-active" aria-current="page">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Submit Feedback
          </a>
        </li>
        <li>
          <a href="./01-login.html">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Log out
          </a>
        </li>
      </ul>
    </aside>

    <main class="main">
      <div class="main__top">
        <h1 class="main__greeting">Submit Feedback</h1>
        <div class="main__tools">
          <span class="main__user-name">Your Name</span>
          <a class="tool-btn tool-btn--avatar" href="./36-profile.html" aria-label="Profile">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
          </a>
          <a class="tool-btn" href="./37-notif.html" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          </a>
          <button type="button" class="tool-btn tool-btn--help" aria-label="Help">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.028-.94-.585 0-1.01.388-1.01.94z"/></svg>
          </button>
        </div>
      </div>

      <div class="detail-head">
        <a class="detail-back" href="./33-feedbacl.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          Feedback Details
        </a>
        <p class="detail-submitted" id="detail-submitted">SUBMITTED ON JULY 10, 2026, 9:30 AM</p>
      </div>

      <div class="detail-panel">
        <div class="detail-row">
          <span class="detail-row__label">Feedback Title</span>
          <span class="detail-row__value" id="detail-title-value">Excellent Event Organization</span>
        </div>

        <div class="detail-row">
          <span class="detail-row__label">Feedback Type</span>
          <span class="detail-row__value" id="detail-type-value">General Feedback</span>
        </div>

        <div class="detail-row">
          <span class="detail-row__label">Rating</span>
          <div class="detail-stars" id="detail-stars" role="img" aria-label="Rating: 1 out of 5 stars">
            <span class="detail-stars__star is-filled" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></span>
            <span class="detail-stars__star" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></span>
            <span class="detail-stars__star" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></span>
            <span class="detail-stars__star" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></span>
            <span class="detail-stars__star" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></span>
          </div>
        </div>

        <div class="detail-block">
          <span class="detail-block__label">Uploaded Media</span>
          <div id="detail-media">
            <div class="detail-media">
              <div class="detail-media__thumb" role="img" aria-label="Uploaded media 1"></div>
              <div class="detail-media__thumb detail-media__thumb--alt" role="img" aria-label="Uploaded media 2"></div>
            </div>
          </div>
        </div>

        <div class="detail-block">
          <label class="detail-block__label" for="detail-comment">Detailed Comment</label>
          <textarea class="detail-comment" id="detail-comment" readonly aria-readonly="true"></textarea>
        </div>
      </div>
    </main>
  </div>

  <script src="feedback-data.js"></script>
  <script src="feedback-details.js"></script>
  <script>
    (function () {
      var app = document.querySelector('.app');
      var toggle = document.getElementById('sidebar-toggle');
      var collapse = document.getElementById('sidebar-collapse');
      var storageKey = 'dc_sidebar_collapsed';

      function setSidebarCollapsed(collapsed) {
        app.classList.toggle('is-sidebar-collapsed', collapsed);
        localStorage.setItem(storageKey, collapsed);
      }

      if (localStorage.getItem(storageKey) === 'true' && window.innerWidth > 900) {
        setSidebarCollapsed(true);
      }

      collapse.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(true);
      });

      toggle.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(false);
      });
    })();
  </script>
  <script src="site-tour.js"></script>
</body>
</html>
