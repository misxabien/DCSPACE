<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    :root {
      --blue: #448AFF;
      --blue-dark: #3a7aee;
      --blue-btn: #3d82f0;
      --cream: #FFFEF4;
      --text: #1a1a1a;
      --muted: #8e8e8e;
      --input-bg: rgba(68, 138, 255, 0.06);
      --placeholder: #b0b0b0;
      --blue-ring: rgba(68, 138, 255, 0.15);
      --input-radius: 10px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      background: linear-gradient(
        180deg,
        #DBE8FF 0%,
        #8AB6FF 27%,
        #448AFF 50%,
        #8AB6FF 77%,
        #DBE8FF 100%
      );
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(calc(550px + 112px), 1fr) minmax(0, 1fr);
      min-height: 100vh;
      width: 100%;
    }

    /* ── Left form panel ── */
    .form-panel {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      background: var(--cream);
      border-radius: 0;
      box-shadow: 12px 0 40px rgba(0, 40, 90, 0.1);
      padding: 36px 56px 40px 56px;
      margin-right: -24px;
      min-height: 100vh;
    }

    .form-inner {
      width: 550px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      text-align: left;
      min-height: calc(100vh - 76px);
    }

    .page-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 26px;
      line-height: 1.15;
    }

    .section-copy {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 46px;
    }

    .form-inner form {
      width: 100%;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1.5px solid transparent;
      border-radius: var(--input-radius);
      background: var(--input-bg);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0, 40, 90, 0.03);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .form-group input::placeholder {
      color: var(--placeholder);
      font-style: italic;
      font-weight: 400;
      font-size: 13px;
    }

    .form-group input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px var(--blue-ring);
    }

    .form-actions {
      margin-top: auto;
      padding-top: 32px;
      display: flex;
      justify-content: flex-end;
      width: 100%;
    }

    .btn-send {
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s ease;
      box-shadow: 0 3px 10px rgba(68, 138, 255, 0.2);
    }

    .btn-send:hover {
      background: var(--blue-dark);
    }

    /* ── Right hero panel ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 48px 32px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      line-height: 0;
      margin-bottom: -30px;
    }

    .logo {
      width: 260px;
      height: auto;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 6px 12px rgba(0, 40, 80, 0.12));
    }

    .greeting {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--blue);
    }

    .hero-sub {
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 28px;
      opacity: 0.95;
    }

    .btn-signin-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 175px;
      height: 40px;
      padding: 0 22px;
      border: none;
      border-radius: 8px;
      background: var(--blue-btn);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 50, 120, 0.22);
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-arrow {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-signin-link:hover {
      background: var(--blue-dark);
    }

    .btn-signin-link:active {
      transform: scale(0.99);
    }

    @media (max-width: 1024px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .form-panel {
        width: 100%;
        margin-right: 0;
        padding: 36px 32px 40px;
        min-height: auto;
        order: 2;
      }

      .hero {
        order: 1;
        padding: 40px 24px 32px;
      }

      .form-inner {
        max-width: 100%;
        min-height: auto;
      }

      .page-title {
        font-size: 26px;
      }

      .form-actions {
        margin-top: 32px;
      }
    }

    @media (max-width: 480px) {
      .logo {
        width: 220px;
      }

      .greeting {
        font-size: 22px;
      }

      .form-panel {
        padding: 28px 24px 32px;
      }

      .form-actions {
        justify-content: stretch;
      }

      .btn-send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="form-panel" aria-label="Reset password form">
      <div class="form-inner">
        <h1 class="page-title">Reset your password</h1>
        <p class="section-copy">Enter your school email and we will send a verification code.</p>

        <form action="./08-fpverification.html" method="get">
          <div class="form-group">
            <label for="schoolEmail">School Email:</label>
            <input
              type="email"
              id="schoolEmail"
              name="schoolEmail"
              placeholder="Enter your school email"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-send">Send verification code</button>
          </div>
        </form>
      </div>
    </section>

    <aside class="hero" aria-label="Forgot password">
      <div class="logo-wrap">
        <img
          src="finallogo.png"
          alt="DC Space logo"
          class="logo"
          width="260"
          height="130"
        >
      </div>
      <h2 class="greeting">Forgot your password?</h2>
      <p class="hero-sub">I remember my password!</p>
      <a href="./01-login.html" class="btn-signin-link">
        Sign In
        <svg class="btn-arrow" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M5 12h14M13 6l6 6-6 6"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </aside>
  </div>
</body>
</html>
