<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Notifications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #DAE4F8;
      --main-bg: #FFFCF8;
      --blue: #448AFF;
      --blue-dark: #3a7aee;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --card-hover: #FFEED5;
      --date-label: #c4a574;
      --sidebar-width: 248px;
      --font: 'Montserrat', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--main-bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 32px;
      min-height: 100vh;
      position: relative;
      transition: width 0.22s ease, padding 0.22s ease;
    }

    .sidebar__collapse {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar__collapse:hover { background: rgba(68, 138, 255, 0.12); }
    .sidebar__collapse svg { width: 22px; height: 22px; display: block; }
    .app.is-sidebar-collapsed .sidebar__collapse { display: none; }

    .sidebar__toggle {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border: none;
      border-radius: 16px;
      background: rgba(68, 138, 255, 0.12);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .app.is-sidebar-collapsed .sidebar__toggle { display: flex; }

    .sidebar__toggle img {
      width: 32px;
      height: 32px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
    }

    .sidebar__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
    }

    .sidebar__logo {
      width: 120px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
      margin-bottom: 4px;
    }

    .sidebar__title {
      font-size: 15px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.06em;
    }

    .nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .nav a svg { width: 20px; height: 20px; flex-shrink: 0; stroke: currentColor; fill: none; }
    .nav a:hover:not(.is-active) { background: rgba(68, 138, 255, 0.12); }
    .nav a.is-active { background: var(--blue); color: #fff; }
    .nav a.is-active svg { stroke: #fff; }

    .sidebar__spacer { flex: 1; min-height: 24px; }
    .nav--bottom { margin-top: auto; padding-top: 16px; }

    .app.is-sidebar-collapsed .sidebar { width: 102px; padding: 28px 12px 24px; }
    .app.is-sidebar-collapsed .sidebar__brand { display: none; }
    .app.is-sidebar-collapsed .nav a { justify-content: center; gap: 0; padding: 14px 0; font-size: 0; }
    .app.is-sidebar-collapsed .nav a svg { width: 24px; height: 24px; }
    .app.is-sidebar-collapsed .nav a.is-active { width: 56px; margin: 0 auto; }

    /* ── Main ── */
    .main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 32px 40px 48px;
    }

    .main__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .main__greeting {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
    }

    .main__tools {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .main__user-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      white-space: nowrap;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      flex-shrink: 0;
      text-decoration: none;
    }

    .tool-btn:hover { background: rgba(68, 138, 255, 0.1); }
    .tool-btn--avatar { background: #c5d9fc; }
    .tool-btn--notif { background: rgba(68, 138, 255, 0.15); }
    .tool-btn--help { background: var(--blue); color: #fff; }
    .tool-btn svg { width: 22px; height: 22px; }

    /* ── Toolbar: tabs + search ── */
    .notif-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .notif-tabs {
      display: inline-flex;
      align-items: center;
      background: #fff;
      border: 1px solid rgba(68, 138, 255, 0.22);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
      flex-shrink: 0;
    }

    .notif-tab {
      border: none;
      background: transparent;
      padding: 8px 22px;
      border-radius: 999px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
    }

    .notif-tab:hover:not(.is-active) {
      color: var(--blue);
      background: rgba(68, 138, 255, 0.06);
    }

    .notif-tab.is-active {
      background: rgba(68, 138, 255, 0.14);
      color: var(--blue);
    }

    .notif-toolbar__search {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      min-width: 220px;
      max-width: 380px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .search-bar__field {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      padding: 0 14px;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 10px 0 0 10px;
      border-right: none;
    }

    .search-bar__field svg {
      width: 17px;
      height: 17px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .search-bar__field input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: transparent;
      min-width: 0;
    }

    .search-bar__field input::placeholder { color: #b0b0b0; }

    .search-bar__filter {
      width: 44px;
      height: 40px;
      border: none;
      border-radius: 0 10px 10px 0;
      background: linear-gradient(180deg, #f5c842 0%, #e8a832 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .search-bar__filter svg {
      width: 18px;
      height: 18px;
      stroke: #1a1a1a;
    }

    /* ── Notification groups ── */
    .notif-group {
      margin-bottom: 32px;
    }

    .notif-group:last-child {
      margin-bottom: 0;
    }

    .notif-group__head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .notif-group__label {
      font-size: 13px;
      font-weight: 600;
      color: var(--date-label);
      flex-shrink: 0;
    }

    .notif-group__line {
      flex: 1;
      height: 1px;
      background: rgba(196, 165, 116, 0.4);
    }

    .notif-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
      padding: 16px 18px;
      border: none;
      background: #fff;
      text-align: left;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.18s ease;
      position: relative;
    }

    .notif-item:hover,
    .notif-item.is-highlighted {
      background: var(--card-hover);
    }

    .notif-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 74px;
      right: 18px;
      bottom: 0;
      height: 1px;
      background: rgba(68, 138, 255, 0.1);
    }

    .notif-item__icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .notif-item__icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
    }

    .notif-item__icon--blue { background: var(--blue); }
    .notif-item__icon--cyan { background: #26c6da; }
    .notif-item__icon--red { background: #ef5350; }
    .notif-item__icon--gold { background: #d4a853; }

    .notif-item__body {
      flex: 1;
      min-width: 0;
      padding-top: 2px;
    }

    .notif-item__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .notif-item__desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      opacity: 0.88;
    }

    .notif-item__time {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
      padding-top: 4px;
    }

    .notif-empty {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      padding: 24px 18px;
      background: #fff;
      text-align: center;
    }

    .notif-empty[hidden] { display: none; }

    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; padding: 20px; }
      .sidebar__collapse, .sidebar__toggle { display: none !important; }
      .sidebar__spacer, .nav--bottom { display: none; }
      .main { padding: 24px 20px 40px; }
      .main__user-name { display: none; }
      .notif-toolbar { flex-direction: column; align-items: stretch; }
      .notif-toolbar__search { max-width: 100%; }
      .notif-tabs { align-self: flex-start; }
    }
  </style>
</head>

  <script>
    (function () {
      var app = document.querySelector('.app');
      var toggle = document.getElementById('sidebar-toggle');
      var collapse = document.getElementById('sidebar-collapse');
      var storageKey = 'dc_sidebar_collapsed';

      function setSidebarCollapsed(collapsed) {
        app.classList.toggle('is-sidebar-collapsed', collapsed);
        localStorage.setItem(storageKey, collapsed);
      }

      if (localStorage.getItem(storageKey) === 'true' && window.innerWidth > 900) {
        setSidebarCollapsed(true);
      }

      collapse.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(true);
      });

      toggle.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(false);
      });

      var tabs = document.querySelectorAll('.notif-tab');
      var items = document.querySelectorAll('.notif-item');
      var groups = document.querySelectorAll('.notif-group');
      var searchInput = document.getElementById('notif-search');
      var emptyEl = document.getElementById('notif-empty');
      var activeFilter = 'all';

      function applyFilters() {
        var query = searchInput ? searchInput.value.trim().toLowerCase() : '';
        var visibleCount = 0;

        items.forEach(function (item) {
          var tags = (item.getAttribute('data-filter-tags') || '').split(/\s+/);
          var searchText = item.getAttribute('data-search') || '';
          var title = item.querySelector('.notif-item__title').textContent.toLowerCase();
          var desc = item.querySelector('.notif-item__desc').textContent.toLowerCase();
          var matchesFilter = activeFilter === 'all' || tags.indexOf(activeFilter) !== -1;
          var matchesSearch = !query || searchText.indexOf(query) !== -1 || title.indexOf(query) !== -1 || desc.indexOf(query) !== -1;
          var show = matchesFilter && matchesSearch;
          item.closest('li').hidden = !show;
          if (show) visibleCount++;
        });

        groups.forEach(function (group) {
          var listItems = group.querySelectorAll('.notif-list > li');
          var groupVisible = false;
          listItems.forEach(function (li) {
            if (!li.hidden) groupVisible = true;
          });
          group.hidden = !groupVisible;
        });

        emptyEl.hidden = visibleCount > 0;
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) {
            t.classList.remove('is-active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('is-active');
          tab.setAttribute('aria-selected', 'true');
          activeFilter = tab.getAttribute('data-filter') || 'all';
          applyFilters();
        });
      });

      if (searchInput) {
        searchInput.addEventListener('input', applyFilters);
      }

      items.forEach(function (item) {
        item.addEventListener('click', function () {
          item.classList.remove('is-highlighted');
        });
      });

      try {
        var profileRaw = localStorage.getItem('dc_profile_info');
        if (profileRaw) {
          var profile = JSON.parse(profileRaw);
          if (profile.name) {
            var nameEl = document.querySelector('.main__user-name');
            if (nameEl) nameEl.textContent = profile.name;
          }
        }
      } catch (err) { /* ignore */ }
    })();
  </script>
</body>
</html>
