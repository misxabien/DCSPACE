<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Submit Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #DAE4F8;
      --main-bg: #FFFCF8;
      --blue: #448AFF;
      --blue-dark: #3a7aee;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --card-hover: #FFEED5;
      --sidebar-width: 248px;
      --font: 'Montserrat', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--main-bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 32px;
      min-height: 100vh;
      position: relative;
      transition: width 0.22s ease, padding 0.22s ease;
    }

    .sidebar__collapse {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar__collapse:hover { background: rgba(68, 138, 255, 0.12); }
    .sidebar__collapse svg { width: 22px; height: 22px; display: block; }
    .app.is-sidebar-collapsed .sidebar__collapse { display: none; }

    .sidebar__toggle {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border: none;
      border-radius: 16px;
      background: rgba(68, 138, 255, 0.12);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .app.is-sidebar-collapsed .sidebar__toggle { display: flex; }

    .sidebar__toggle img {
      width: 32px;
      height: 32px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
    }

    .sidebar__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
    }

    .sidebar__logo {
      width: 120px;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
      margin-bottom: 4px;
    }

    .sidebar__title {
      font-size: 15px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.06em;
    }

    .nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .nav a svg { width: 20px; height: 20px; flex-shrink: 0; stroke: currentColor; fill: none; }
    .nav a:hover:not(.is-active) { background: rgba(68, 138, 255, 0.12); }
    .nav a.is-active { background: var(--blue); color: #fff; }
    .nav a.is-active svg { stroke: #fff; }

    .sidebar__spacer { flex: 1; min-height: 24px; }
    .nav--bottom { margin-top: auto; padding-top: 16px; }

    .app.is-sidebar-collapsed .sidebar { width: 102px; padding: 28px 12px 24px; }
    .app.is-sidebar-collapsed .sidebar__brand { display: none; }
    .app.is-sidebar-collapsed .nav a { justify-content: center; gap: 0; padding: 14px 0; font-size: 0; }
    .app.is-sidebar-collapsed .nav a svg { width: 24px; height: 24px; }
    .app.is-sidebar-collapsed .nav a.is-active { width: 56px; margin: 0 auto; }

    /* ── Main ── */
    .main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 32px 40px 48px;
    }

    .main__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .main__greeting {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
    }

    .main__tools {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .main__user-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      white-space: nowrap;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      flex-shrink: 0;
    }

    .tool-btn:hover { background: rgba(68, 138, 255, 0.1); }
    .tool-btn--avatar { background: #c5d9fc; }
    .tool-btn--help { background: var(--blue); color: #fff; }
    .tool-btn svg { width: 22px; height: 22px; }

    /* ── CTA Banner ── */
    .feedback-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px;
      margin-bottom: 36px;
      border-radius: 14px;
      background: linear-gradient(90deg, #f0a030 0%, #f5c842 45%, #e8a832 100%);
      box-shadow: 0 2px 12px rgba(240, 160, 48, 0.25);
    }

    .feedback-cta__text { flex: 1; min-width: 0; }

    .feedback-cta__title {
      font-size: clamp(1.35rem, 2.5vw, 1.75rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .feedback-cta__subtitle {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.5;
      max-width: 520px;
    }

    .feedback-cta__btn {
      flex-shrink: 0;
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      white-space: nowrap;
    }

    .feedback-cta__btn:hover { background: var(--blue-dark); }
    .feedback-cta__btn:active { transform: scale(0.98); }

    /* ── Submitted Feedback section ── */
    .feedback-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 0;
      flex-wrap: wrap;
    }

    .feedback-section__head h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }

    .feedback-section__tools {
      display: flex;
      align-items: center;
      flex: 1;
      justify-content: flex-end;
      min-width: 200px;
      max-width: 360px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .search-bar__field {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      padding: 0 14px;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 10px 0 0 10px;
      border-right: none;
    }

    .search-bar__field svg {
      width: 17px;
      height: 17px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .search-bar__field input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: transparent;
      min-width: 0;
    }

    .search-bar__field input::placeholder { color: #b0b0b0; }

    .search-bar__filter {
      width: 44px;
      height: 40px;
      border: none;
      border-radius: 0 10px 10px 0;
      background: linear-gradient(180deg, #f5c842 0%, #e8a832 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .search-bar__filter svg {
      width: 18px;
      height: 18px;
      stroke: #1a1a1a;
    }

    /* ── Feedback list ── */
    .feedback-list {
      list-style: none;
      margin-top: 16px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid rgba(68, 138, 255, 0.15);
      overflow: hidden;
    }

    .feedback-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: #fff;
      border: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.18s ease, box-shadow 0.18s ease;
      position: relative;
    }

    .feedback-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 0;
      height: 1px;
      background: rgba(68, 138, 255, 0.12);
    }

    .feedback-item:hover {
      background: var(--card-hover);
      box-shadow: 0 4px 14px rgba(68, 138, 255, 0.1);
      z-index: 1;
    }

    .feedback-item:hover::after,
    .feedback-item:hover + .feedback-item::after {
      opacity: 0;
    }

    .feedback-item__check {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      accent-color: var(--blue);
      cursor: pointer;
    }

    .feedback-item__body {
      flex: 1;
      min-width: 0;
    }

    .feedback-item__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .feedback-item__type {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      opacity: 0.85;
    }

    .feedback-item__arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      transition: background 0.18s ease, color 0.18s ease;
      border-radius: 50%;
    }

    .feedback-item__arrow svg {
      width: 16px;
      height: 16px;
    }

    .feedback-item:hover .feedback-item__arrow {
      background: var(--blue);
      color: #fff;
    }

    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; padding: 20px; }
      .sidebar__collapse, .sidebar__toggle { display: none !important; }
      .sidebar__spacer, .nav--bottom { display: none; }
      .main { padding: 24px 20px 40px; }
      .main__user-name { display: none; }
      .feedback-cta { flex-direction: column; align-items: flex-start; padding: 24px; }
      .feedback-cta__btn { width: 100%; text-align: center; }
      .feedback-section__head { flex-direction: column; align-items: flex-start; }
      .feedback-section__tools { max-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>

      <section class="feedback-cta" aria-labelledby="cta-title">

              <span class="feedback-item__arrow" aria-hidden="true">

              </span>
            </button>
          </li>
          <li>
            <button type="button" class="feedback-item" data-feedback-id="3" aria-label="View feedback details">
              <input type="checkbox" class="feedback-item__check" aria-label="Select feedback" onclick="event.stopPropagation()">
              <div class="feedback-item__body">
                <p class="feedback-item__title">Feedback Title</p>
                <p class="feedback-item__type">Feedback Type</p>
              </div>
              <span class="feedback-item__arrow" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>

            <button type="button" class="feedback-item" data-feedback-id="4" aria-label="View feedback details">
              <input type="checkbox" class="feedback-item__check" aria-label="Select feedback" onclick="event.stopPropagation()">
              <div class="feedback-item__body">

              <div class="feedback-item__body">
                <p class="feedback-item__title">Feedback Title</p>

  <script src="feedback-data.js"></script>
  <script>
    (function () {
      var app = document.querySelector('.app');
      var toggle = document.getElementById('sidebar-toggle');
      var collapse = document.getElementById('sidebar-collapse');
      var storageKey = 'dc_sidebar_collapsed';

      function setSidebarCollapsed(collapsed) {
        app.classList.toggle('is-sidebar-collapsed', collapsed);
        localStorage.setItem(storageKey, collapsed);
      }

      if (localStorage.getItem(storageKey) === 'true' && window.innerWidth > 900) {
        setSidebarCollapsed(true);
      }

      collapse.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(true);
      });

      toggle.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(false);
      });

      var searchInput = document.querySelector('.search-bar__field input');
      var items = document.querySelectorAll('.feedback-item');

      items.forEach(function (item) {
        item.addEventListener('click', function () {
          var id = item.getAttribute('data-feedback-id') || '1';
          window.location.href = DCFeedback.getFeedbackDetailUrl(id);
        });
      });

      if (searchInput) {
        searchInput.addEventListener('input', function () {
          var query = searchInput.value.trim().toLowerCase();
          items.forEach(function (item) {
            var title = item.querySelector('.feedback-item__title').textContent.toLowerCase();
            var type = item.querySelector('.feedback-item__type').textContent.toLowerCase();
            var row = item.closest('li');
            row.hidden = query && title.indexOf(query) === -1 && type.indexOf(query) === -1;
          });
        });
      }
    })();
  </script>
</body>
