<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Space | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-1: #d7e7ff;
        --bg-2: #a9c7ff;
        --card: #fbf7ef;
        --text: #2a2a2a;
        --muted: rgba(42, 42, 42, 0.55);
        --border: rgba(42, 42, 42, 0.26);
        --line: rgba(42, 42, 42, 0.18);
        --blue: #3f82f5;
        --blue-2: #2f73ef;
        --pill: #e7efff;
        --shadow: 0 18px 34px rgba(0, 0, 0, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 55% 0%, rgba(255, 255, 255, 0.9), transparent 55%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .page {
        min-height: 100vh;
        padding: 56px 46px;
        display: grid;
        place-items: center;
      }

      .layout {
        width: min(1180px, 100%);
        display: grid;
        grid-template-columns: 1fr 520px;
        align-items: center;
        gap: 34px;
      }

      .brand {
        display: grid;
        justify-items: center;
        text-align: center;
        padding: 20px 10px;
      }

      .brand__logo-wrap {
        width: 430px;
        height: 200px;
        display: grid;
        place-items: center;
      }

      .brand__logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.2));
      }

      .brand__headline {
        margin-top: 34px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: rgba(255, 255, 255, 0.92);
      }

      .brand__sub {
        margin-top: 6px;
        max-width: 520px;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.82);
      }

      .card {
        width: 520px;
        border-radius: 22px;
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 28px 34px 26px;
        justify-self: start;
        margin-left: -22px;
      }

      .btn {
        appearance: none;
        border: 0;
        background: transparent;
        font: inherit;
        color: inherit;
        cursor: pointer;
      }

      .google {
        width: 100%;
        height: 54px;
        border-radius: 10px;
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-weight: 500;
        color: rgba(42, 42, 42, 0.75);
        background: rgba(255, 255, 255, 0.35);
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 14px;
        margin: 18px 0 16px;
        color: rgba(42, 42, 42, 0.55);
        font-weight: 600;
        font-size: 12px;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: var(--line);
      }

      .field {
        position: relative;
        display: block;
        width: 100%;
        margin-top: 14px;
      }

      .input {
        width: 100%;
        height: 54px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.35);
        padding: 0 48px 0 46px;
        font-size: 14px;
        font-weight: 500;
        outline: none;
      }

      .field--password .input {
        padding-right: 56px;
      }

      .input::placeholder {
        color: rgba(42, 42, 42, 0.38);
        font-weight: 500;
      }

      .icon-left {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        color: rgba(42, 42, 42, 0.52);
        pointer-events: none;
        left: 16px;
      }

      .eye {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: rgba(42, 42, 42, 0.52);
      }

      .eye svg {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: grid;
        justify-items: end;
        margin-top: 10px;
      }

      .link {
        font-size: 11px;
        font-weight: 600;
        color: var(--blue);
        text-decoration: none;
      }

      .link:hover {
        text-decoration: underline;
      }

      .primary {
        margin-top: 14px;
        width: 100%;
        height: 56px;
        border-radius: 12px;
        background: var(--blue);
        color: white;
        font-weight: 700;
        letter-spacing: 0.4px;
        box-shadow: 0 10px 16px rgba(63, 130, 245, 0.35);
      }

      .primary:hover {
        background: var(--blue-2);
      }

      .below {
        margin-top: 14px;
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: rgba(42, 42, 42, 0.65);
      }

      .below a {
        margin-left: 6px;
        font-weight: 700;
        color: var(--blue);
        text-decoration: none;
      }

      .below a:hover {
        text-decoration: underline;
      }

      .role {
        margin-top: 16px;
        width: 340px;
        height: 46px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(42, 42, 42, 0.14);
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 6px;
        gap: 6px;
        margin-left: auto;
        margin-right: auto;
      }

      .role__btn {
        height: 100%;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 700;
        font-size: 12px;
        color: rgba(42, 42, 42, 0.5);
      }

      .role__btn[aria-pressed="true"] {
        background: var(--blue);
        color: white;
        box-shadow: 0 8px 14px rgba(63, 130, 245, 0.32);
      }

      .role__btn svg {
        width: 18px;
        height: 18px;
      }

      @media (max-width: 1060px) {
        .layout {
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 34px;
        }

        .brand {
          padding-top: 0;
        }

        .card {
          width: min(520px, 100%);
          margin-left: 0;
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 30px 16px;
        }

        .brand__logo {
          transform: scale(0.92);
        }

        .brand__headline {
          font-size: 22px;
        }

        .role {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main class="page">
      <section class="layout" aria-label="Login layout">
        <aside class="brand" aria-label="Brand section">
          <div class="brand__logo-wrap">
            <img
              class="brand__logo"
              src="./assets/logo-dc-space.png"
              alt="DC Space logo"
              onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=&quot;width:100%;height:100%;border-radius:18px;background:rgba(255,255,255,.16);border:1px dashed rgba(255,255,255,.45);display:grid;place-items:center;color:rgba(255,255,255,.9);font-weight:600;font-size:14px;letter-spacing:.3px;&quot;>Add logo at HTML/assets/logo-dc-space.png</div>';"
            />
          </div>
          <div class="brand__headline">TAP. ATTEND. GET CERTIFIED.</div>
          <div class="brand__sub">
            An AI-assisted RFID system designed to simplify event tracking and automate certificate
            issuance.
          </div>
        </aside>

        <section class="card" aria-label="Login card">
          <button class="btn google" type="button" aria-label="Continue with Google">
            <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
              <path
                fill="#FFC107"
                d="M43.611 20.083H42V20H24v8h11.303C33.653 32.657 29.236 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.967 3.033l5.657-5.657C34.72 6.053 29.617 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.651-.389-3.917z"
              />
              <path
                fill="#FF3D00"
                d="M6.306 14.691l6.571 4.819C14.655 16.108 19.001 12 24 12c3.059 0 5.842 1.154 7.967 3.033l5.657-5.657C34.72 6.053 29.617 4 24 4 16.318 4 9.656 8.336 6.306 14.691z"
              />
              <path
                fill="#4CAF50"
                d="M24 44c5.112 0 9.828-1.967 13.377-5.158l-6.174-5.227C29.297 35.091 26.756 36 24 36c-5.215 0-9.619-3.317-11.297-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
              />
              <path
                fill="#1976D2"
                d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.1 5.615h.001l6.174 5.227C36.941 39.243 44 34 44 24c0-1.341-.138-2.651-.389-3.917z"
              />
            </svg>
            <span>Continue with SDCA Gmail Account</span>
          </button>

          <div class="divider" aria-hidden="true">OR</div>

          <form action="./02-dashboard.html" method="get" autocomplete="on">
            <label class="field field--password">
              <span class="sr-only" style="position: absolute; left: -9999px">Email</span>
              <span class="icon-left" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M4 6.5c0-1.105.895-2 2-2h12c1.105 0 2 .895 2 2v11c0 1.105-.895 2-2 2H6c-1.105 0-2-.895-2-2v-11Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M6.2 7.1 12 11.2l5.8-4.1"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <input class="input" name="email" type="email" placeholder="Email" required />
            </label>

            <label class="field">
              <span class="sr-only" style="position: absolute; left: -9999px">Password</span>
              <span class="icon-left" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M7 10V8.2C7 5.88 8.79 4 11 4h2c2.21 0 4 1.88 4 4.2V10"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                  <path
                    d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v5A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-5A2.5 2.5 0 0 1 6.5 10Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>

              <input
                id="password"
                class="input"
                name="password"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                required
              />

              <button class="btn eye" type="button" id="togglePassword" aria-label="Show password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M2.3 12s3.4-7 9.7-7 9.7 7 9.7 7-3.4 7-9.7 7-9.7-7-9.7-7Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M12 15.4a3.4 3.4 0 1 0 0-6.8 3.4 3.4 0 0 0 0 6.8Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                </svg>
              </button>
            </label>

            <div class="actions">
              <a class="link" href="#" aria-label="Forgot password">FORGOT PASSWORD?</a>
            </div>

            <button class="btn primary" type="submit">SIGN IN</button>
          </form>

          <div class="below">
            Don't have an account?
            <a href="#" aria-label="Register here">REGISTER HERE</a>
          </div>

          <div class="role" role="group" aria-label="Role selection">
            <button class="btn role__btn" type="button" id="roleStudent" aria-pressed="true">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 3 2.5 8l9.5 5 9.5-5L12 3Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M5.5 10.5V16c0 1.4 3 3.5 6.5 3.5s6.5-2.1 6.5-3.5v-5.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
              Student
            </button>
            <button class="btn role__btn" type="button" id="roleFaculty" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M16.6 10.2a2.6 2.6 0 1 0 0-5.2 2.6 2.6 0 0 0 0 5.2Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M4 20v-1.2c0-2.1 3-4 5-4s5 1.9 5 4V20"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M14.4 20v-1c0-1.7 2.1-3.2 3.6-3.2S22 17.3 22 19v1"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
              Faculty
            </button>
          </div>
        </section>
      </section>
    </main>

    <script>
      (function () {
        const password = document.getElementById("password");
        const toggle = document.getElementById("togglePassword");

        const roleStudent = document.getElementById("roleStudent");
        const roleFaculty = document.getElementById("roleFaculty");

        function setRole(active) {
          const isStudent = active === "student";
          roleStudent.setAttribute("aria-pressed", String(isStudent));
          roleFaculty.setAttribute("aria-pressed", String(!isStudent));
        }

        roleStudent.addEventListener("click", () => setRole("student"));
        roleFaculty.addEventListener("click", () => setRole("faculty"));

        toggle.addEventListener("click", () => {
          const isPassword = password.type === "password";
          password.type = isPassword ? "text" : "password";
          toggle.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
        });
      })();
    </script>
  </body>
</html>
