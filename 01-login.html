<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    :root {
      --blue: #448AFF;
      --blue-dark: #3a7aee;
      --blue-ring: rgba(68, 138, 255, 0.15);
      --blue-shadow: rgba(68, 138, 255, 0.28);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      background: linear-gradient(
        180deg,
        #DBE8FF 0%,
        #8AB6FF 27%,
        #448AFF 50%,
        #8AB6FF 77%,
        #DBE8FF 100%
      );
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 40px;
    }

    .page-inner {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 20px;
    }

    /* ── Left branding ── */
    .branding {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 12px 16px;
      gap: 0;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      line-height: 0;
      margin-bottom: -40px;
    }
    @keyframes logoFloat {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-12px);
  }
}
.logo {
  width: 280px;
  height: auto;
  display: block;
  margin: 0;
  mix-blend-mode: screen;
  filter: drop-shadow(0 6px 12px rgba(0, 40, 80, 0.12));
  animation: logoFloat 3s ease-in-out infinite;  /* add this line */
}

    .branding__copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: -8px;
    }

    .tagline {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.15;
      margin: 0;
      color: #fff;
    }

    .description {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
      max-width: 420px;
      margin: 0;
      color: #fff;
      text-align: center;
    }

    /* ── Sign-in card ── */
    .signin-section {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signin-card {
      width: 100%;
      max-width: 390px;
      background: #FFFEF4;
      border-radius: 22px;
      padding: 32px 34px 24px;
      box-shadow: 0 10px 28px rgba(0, 40, 90, 0.14);
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--blue);
      text-align: center;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #8e8e8e;
      margin-bottom: 5px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: #b0b0b0;
    }

    .input-icon svg {
      width: 16px;
      height: 16px;
    }

    .input-wrap input {
      width: 100%;
      height: 38px;
      padding: 0 12px 0 38px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #333;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .input-wrap input::placeholder {
      color: #b8b8b8;
    }

    .input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-ring);
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 10px;
      font-weight: 700;
      color: var(--blue);
      text-decoration: none;
      margin: -2px 0 14px;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-signin {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-bottom: 12px;
    }

    .btn-signin:hover {
      background: var(--blue-dark);
    }

    .register-text {
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      color: #8e8e8e;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .register-text a {
      font-weight: 700;
      color: var(--blue);
      text-decoration: none;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .register-text a:hover {
      text-decoration: underline;
    }

    /* ── Role toggle ── */
    .role-toggle {
      display: flex;
      width: 100%;
      margin: 0 auto;
      background: #f0f0f0;
      border-radius: 999px;
      padding: 4px;
      gap: 0;
    }

    .role-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      border: none;
      border-radius: 999px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--blue);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .role-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .role-btn.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 10px var(--blue-shadow);
    }

    .role-btn.active svg {
      fill: #fff;
      stroke: #fff;
    }

    .role-btn.inactive {
      color: var(--blue);
    }

    .role-btn.inactive svg {
      fill: none;
      stroke: var(--blue);
    }

    @media (max-width: 1024px) {
      .page-inner {
        grid-template-columns: 1fr;
        gap: 48px;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 32px 20px;
      }

      .signin-card {
        padding: 36px 28px 28px;
      }

      .branding {
        gap: 0;
      }

      .logo-wrap {
        margin-bottom: -30px;
      }

      .branding__copy {
        gap: 4px;
      }

      .description {
        max-width: 280px;
        font-size: 11px;
      }

      .tagline {
        font-size: 18px;
      }

      .logo {
        width: 260px;
      }

      .role-toggle {
        width: 100%;
      }

      .role-btn {
        flex: 1;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-inner">
      <section class="branding" aria-label="DC Space branding">
        <div class="logo-wrap">
          <img
            src="finallogo.png"
            alt="DC Space logo"
            class="logo"
            width="280"
            height="140"
          >
        </div>
        <div class="branding__copy">
          <h1 class="tagline">TAP. ATTEND. GET CERTIFIED.</h1>
          <p class="description">
            An AI-assisted RFID system designed to simplify event tracking<br>
            and automate certificate issuance.
          </p>
        </div>
      </section>

      <section class="signin-section" aria-label="Sign in form">
        <div class="signin-card">
          <h2 class="card-title">SIGN IN TO DC SPACE!</h2>

          <form action="./09-home.html" method="get">
            <div class="form-group">
              <label for="email">Your School Email</label>
              <div class="input-wrap">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M2 7l10 7 10-7"/>
                  </svg>
                </span>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Enter your school email address"
                  autocomplete="email"
                  required
                >
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrap">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="11" width="14" height="10" rx="2"/>
                    <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                  </svg>
                </span>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                >
              </div>
            </div>

            <a href="./07-fpemail.html" class="forgot-link">Forgot your password?</a>

            <button type="submit" class="btn-signin">SIGN IN</button>
          </form>

          <p class="register-text">
            Don't have an account? <a href="./02-create.html">REGISTER HERE</a>
          </p>

          <div class="role-toggle" role="group" aria-label="Select role">
            <button type="button" class="role-btn active" data-role="student" aria-pressed="true">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M12 2 2 8.5v2.2L12 17l10-6.3V8.5L12 2zm0 2.8 6.8 4.3L12 13.2 5.2 9.1 12 4.8zM4 11.2V16l8 5 8-5v-4.8l-8 3.8-8-3.8z"/>
                <rect x="10" y="14" width="4" height="6" rx="0.5"/>
              </svg>
              Student
            </button>
            <button type="button" class="role-btn inactive" data-role="faculty" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              Faculty
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const roleBtns = document.querySelectorAll('.role-btn');
      roleBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          roleBtns.forEach(function (b) {
            b.classList.remove('active');
            b.classList.add('inactive');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.remove('inactive');
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');
        });
      });
    })();
  </script>
</body>
</html>
