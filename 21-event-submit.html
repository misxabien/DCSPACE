<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Space — Submit Files</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #DAE4F8;
      --main-bg: #FFFCF8;
      --blue: #448AFF;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border-light: #d8dce3;
      --card-hover: #FFEED5;
      --sidebar-width: 248px;
      --font: 'Montserrat', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--main-bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 32px;
      min-height: 100vh;
      transition: width 0.22s ease, padding 0.22s ease;
      position: relative;
    }

    .sidebar__collapse {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .sidebar__collapse:hover { background: rgba(68, 138, 255, 0.12); }
    .sidebar__collapse svg { width: 22px; height: 22px; display: block; }
    .app.is-sidebar-collapsed .sidebar__collapse { display: none; }

    .sidebar__toggle {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border: none;
      border-radius: 16px;
      background: rgba(68, 138, 255, 0.12);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .app.is-sidebar-collapsed .sidebar__toggle { display: flex; }

    .sidebar__toggle img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
    }

    .sidebar__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
    }

    .sidebar__logo {
      width: 120px;
      height: auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(59%) sepia(92%) saturate(2775%) hue-rotate(196deg) brightness(101%) contrast(101%);
      margin-bottom: 4px;
    }

    .sidebar__title {
      font-size: 15px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.06em;
    }

    .nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .nav a svg { width: 20px; height: 20px; flex-shrink: 0; stroke: currentColor; fill: none; }
    .nav a:hover:not(.is-active) { background: rgba(68, 138, 255, 0.12); }

    .nav a.is-active {
      background: rgba(68, 138, 255, 0.28);
      color: var(--blue);
    }

    .sidebar__spacer { flex: 1; min-height: 24px; }
    .nav--bottom { margin-top: auto; padding-top: 16px; }

    .app.is-sidebar-collapsed .sidebar { width: 102px; padding: 28px 12px 24px; }
    .app.is-sidebar-collapsed .sidebar__brand { display: none; }
    .app.is-sidebar-collapsed .nav a { justify-content: center; gap: 0; padding: 14px 0; font-size: 0; }
    .app.is-sidebar-collapsed .nav a svg { width: 24px; height: 24px; }
    .app.is-sidebar-collapsed .nav a.is-active { width: 56px; margin: 0 auto; }

    .main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 32px 40px 56px;
      background: var(--main-bg);
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-topbar h1 {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 700;
      color: var(--blue);
      line-height: 1.15;
    }

    .main__tools { display: flex; align-items: center; gap: 12px; }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #e8eef6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
    }

    .tool-btn--avatar { background: #c5d9fc; }
    .tool-btn--help { background: #c5d9fc; color: #fff; }
    .tool-btn--help:hover { background: #b5cffc; color: #fff; }
    .tool-btn--help svg { width: 22px; height: 22px; flex-shrink: 0; }
    .tool-btn svg { width: 22px; height: 22px; }

    .detail-hero {
      width: 100%;
      height: 240px;
      overflow: hidden;
      margin-bottom: 28px;
      background: #d4e2f7;
    }

    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-head {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 24px;
      align-items: start;
      padding-bottom: 24px;
    }

    .detail-date { text-align: center; font-weight: 700; line-height: 1.15; }

    .detail-date__month,
    .detail-date__year {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .detail-date__day {
      display: block;
      font-size: 40px;
      font-weight: 800;
      color: var(--blue);
      margin: 4px 0;
      line-height: 1;
    }

    .detail-info h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .detail-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .detail-meta__row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .detail-meta__row svg { width: 16px; height: 16px; flex-shrink: 0; }
    .detail-meta__row--venue { color: var(--blue); }
    .detail-meta__row--venue svg { stroke: var(--blue); }
    .detail-meta__row--time { color: var(--text); font-weight: 500; }
    .detail-meta__row--time svg { stroke: var(--text); }

    .detail-actions { display: flex; gap: 10px; padding-top: 4px; }

    .detail-icon-btn {
      width: 38px;
      height: 38px;
      border: 1.5px solid var(--blue);
      border-radius: 50%;
      background: var(--main-bg);
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-icon-btn svg { width: 17px; height: 17px; }

    .submit-intro {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
      margin: 8px 0 24px;
      font-weight: 500;
    }

    .submit-panel {
      background: var(--sidebar-bg);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 36px;
    }

    .submit-panel__head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .submit-panel__head svg {
      width: 20px;
      height: 20px;
      stroke: var(--blue);
      fill: none;
    }

    .submit-file-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .submit-file-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .submit-file-row__info { flex: 1; min-width: 0; }

    .submit-file-row__name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .submit-file-row__hint {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
      font-weight: 500;
    }

    .submit-file-row__upload {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--main-bg);
      border: 1.5px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.18s ease;
    }

    .submit-file-row__upload:hover { border-color: var(--blue); }

    .submit-file-row__upload svg {
      width: 22px;
      height: 22px;
    }

    .submit-file-row__input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .detail-action-wrap { width: 100%; }

    .detail-action {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 15px 28px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      display: block;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .detail-action--submit {
      background: #DAE4F8;
      color: var(--blue);
      border: 2px solid transparent;
      cursor: pointer;
    }

    .detail-action--submit:hover { border-color: var(--blue); }

    .detail-action--pending {
      background: var(--card-hover);
      color: #8a5a2a;
      cursor: default;
    }

    .detail-action:disabled { opacity: 1; }

    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; flex-direction: row; flex-wrap: wrap; padding: 20px; }
      .sidebar__brand { flex-direction: row; gap: 12px; margin-bottom: 0; width: 100%; }
      .sidebar__toggle, .sidebar__collapse { display: none !important; }
      .nav { flex-direction: row; flex-wrap: wrap; width: 100%; }
      .sidebar__spacer, .nav--bottom { display: none; }
      .main { padding: 24px 20px 40px; }
      .detail-head { grid-template-columns: 1fr; gap: 16px; }
      .detail-actions { justify-content: flex-start; }
      .submit-file-row { flex-direction: column; }
      .submit-file-row__upload { align-self: flex-end; }
    }
  </style>
  <link rel="stylesheet" href="site-tour.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Main navigation">
      <button type="button" class="sidebar__collapse" id="sidebar-collapse" aria-label="Collapse sidebar">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="2.8" fill="currentColor" opacity="0.78"/>
          <circle cx="17.5" cy="6.5" r="3.6" fill="currentColor"/>
          <circle cx="6.5" cy="17.5" r="3.6" fill="currentColor"/>
          <circle cx="17.5" cy="17.5" r="2.3" fill="currentColor" opacity="0.52"/>
        </svg>
      </button>
      <button type="button" class="sidebar__toggle" id="sidebar-toggle" aria-label="Expand sidebar">
        <img src="finallogo.png" alt="">
      </button>
      <div class="sidebar__brand">
        <img src="finallogo.png" alt="DC Space" class="sidebar__logo" width="120" height="60">
        <span class="sidebar__title">DC SPACE</span>
      </div>
      <nav aria-label="Primary">
        <ul class="nav">
          <li>
            <a href="./09-home.html">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z"/></svg>

            </a>
          </li>
          <li>
            <a href="./14-event.html" class="is-active" aria-current="page">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              Events
            </a>
          </li>
          <li>
            <a href="./22-attendance.html">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              Attendance
            </a>
          </li>
          <li>
            <a href="./29-saved.html">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
              Saved Events
            </a>
          </li>
          <li>
            <a href="./26-certificates.html">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
              Certificates
            </a>
          </li>
        </ul>
      </nav>
      <div class="sidebar__spacer" aria-hidden="true"></div>
      <ul class="nav nav--bottom">
        <li>
          <a href="./33-feedbacl.html">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Submit Feedback
          </a>
        </li>
        <li>
          <a href="./01-login.html">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Log out
          </a>
        </li>
      </ul>
    </aside>

    <main class="main">
      <header class="detail-topbar">
        <h1 id="detail-title">Event Name</h1>
        <div class="main__tools">
          <a class="tool-btn tool-btn--avatar" href="./36-profile.html" aria-label="Profile">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
          </a>
          <a class="tool-btn" href="./37-notif.html" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          </a>
          <button type="button" class="tool-btn tool-btn--help" aria-label="Help">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.028-.94-.585 0-1.01.388-1.01.94z"/></svg>
          </button>
        </div>
      </header>

      <article class="detail-page">
        <div class="detail-hero">
          <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1200&h=480&fit=crop&q=80" alt="">
        </div>

        <div class="detail-head">
          <div class="detail-date">
            <span class="detail-date__month" id="detail-month">Month</span>
            <span class="detail-date__day" id="detail-day">00</span>
            <span class="detail-date__year" id="detail-year">Year</span>
          </div>
          <div class="detail-info">
            <h2 id="detail-name">Event Name</h2>
            <div class="detail-meta">
              <span class="detail-meta__row detail-meta__row--venue">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="detail-venue">Event Venue</span>
              </span>
              <span class="detail-meta__row detail-meta__row--time">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span id="detail-time">Event Time</span>
              </span>
            </div>
          </div>
          <div class="detail-actions">
            <button type="button" class="detail-icon-btn" aria-label="Save event">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            </button>
            <button type="button" class="detail-icon-btn" aria-label="Share event">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            </button>
          </div>
        </div>

        <p class="submit-intro">Please submit the required files below to complete your registration for this event.</p>

        <section class="submit-panel" aria-labelledby="submit-panel-title">
          <div class="submit-panel__head" id="submit-panel-title">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
            Required File(s)
          </div>
          <div class="submit-file-list" id="submit-file-list"></div>
        </section>

        <div class="detail-action-wrap">
          <button type="button" class="detail-action detail-action--submit" id="submit-action">Submit Files</button>
        </div>
      </article>
    </main>
  </div>

  <script src="events-data.js"></script>
  <script src="event-submit.js"></script>
  <script>
    (function () {
      DCEvents.renderSubmitPage();

      var app = document.querySelector('.app');
      var toggle = document.getElementById('sidebar-toggle');
      var collapse = document.getElementById('sidebar-collapse');
      var storageKey = 'dc_sidebar_collapsed';

      function setSidebarCollapsed(collapsed) {
        app.classList.toggle('is-sidebar-collapsed', collapsed);
        localStorage.setItem(storageKey, collapsed);
      }

      if (localStorage.getItem(storageKey) === 'true' && window.innerWidth > 900) {
        setSidebarCollapsed(true);
      }

      collapse.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(true);
      });

      toggle.addEventListener('click', function () {
        if (window.innerWidth <= 900) return;
        setSidebarCollapsed(false);
      });
    })();
  </script>
  <script src="site-tour.js"></script>
</body>
</html>
